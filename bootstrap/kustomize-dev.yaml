apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Alaaibrahim2/argocd-.git
    targetRevision: main
    path: kustomize/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
