apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-sealed

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:

      - name: nginx

        image: nginx

        env:

        - name: USERNAME

          valueFrom:
            secretKeyRef:
              name: app-secret
              key: username

        - name: PASSWORD

          valueFrom:
            secretKeyRef:
              name: app-secret
              key: password
